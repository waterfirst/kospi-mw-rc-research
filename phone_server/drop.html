<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📥 Drop · 기기 간 전송</title>
<style>
  :root{
    --bg:#1e1e2e; --card:#181825; --line:#313244;
    --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --s1:#3987e5; --s2:#199e70; --bad:#e66767;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);
       font-family:"Noto Sans CJK KR","Malgun Gothic",sans-serif;padding:14px;
       max-width:760px;margin:0 auto}
  h1{font-size:20px} .sub{color:var(--muted);font-size:12px;margin:2px 0 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:14px;margin-bottom:12px}
  textarea{width:100%;min-height:70px;background:#11111b;color:var(--ink);
           border:1px solid var(--line);border-radius:8px;padding:10px;font-size:15px;
           resize:vertical}
  button{background:var(--s1);border:0;color:#fff;border-radius:8px;
         padding:10px 16px;font-size:14px;cursor:pointer}
  button.alt{background:#313244} button.del{background:transparent;color:var(--bad);
             border:1px solid var(--line);padding:5px 10px;font-size:12px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:18px;text-align:center;
        color:var(--muted);font-size:14px;cursor:pointer;transition:.15s}
  .drop.hot{border-color:var(--s1);color:var(--ink)}
  .item{border:1px solid var(--line);border-radius:10px;padding:11px;margin-top:9px}
  .item .top{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .name{font-weight:600;word-break:break-all}
  .meta{color:var(--muted);font-size:12px}
  .note{white-space:pre-wrap;word-break:break-word;background:#11111b;border-radius:8px;
        padding:9px;margin-top:8px;font-size:14px;color:var(--ink2);max-height:180px;
        overflow:auto}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:#313244;color:var(--ink2)}
  a.dl{color:var(--s1);text-decoration:none;font-size:13px}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
         background:#11111b;border:1px solid var(--line);padding:9px 16px;border-radius:8px;
         font-size:13px;display:none}
  .empty{color:var(--muted);text-align:center;padding:20px;font-size:14px}
</style>
</head>
<body>
<h1>📥 Drop</h1>
<div class="sub">기기 간 텍스트·파일 전송 · 최근 200개 · 최대 200MB</div>

<div class="card">
  <textarea id="txt" placeholder="여기에 텍스트/링크를 붙여넣고 보내기…"></textarea>
  <div class="row" style="margin-top:8px">
    <button onclick="sendNote()">📝 텍스트 보내기</button>
    <button class="alt" onclick="copyLast()">📋 최근 텍스트 복사</button>
  </div>
</div>

<div class="card">
  <div class="drop" id="drop" onclick="file.click()">
    📎 파일을 여기로 끌어놓거나 눌러서 선택
  </div>
  <input type="file" id="file" multiple style="display:none" onchange="upload(this.files)">
  <div id="prog" class="meta" style="margin-top:8px"></div>
</div>

<div id="list"></div>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
let lastNote="";
function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2200);}
function fmtSize(n){return n<1024?n+'B':n<1048576?(n/1024).toFixed(1)+'KB':
  (n/1048576).toFixed(1)+'MB';}
function fmtTime(ts){const d=new Date(ts*1000),p=x=>String(x).padStart(2,'0');
  return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}

async function load(){
  const r=await(await fetch('/api/list')).json();
  const el=$('#list');
  if(!r.items.length){el.innerHTML='<div class="empty">아직 없음. 위에서 보내보세요.</div>';return;}
  el.innerHTML=r.items.map(it=>{
    if(it.kind==='note'){
      lastNote=lastNote||it.preview;
      return `<div class="item"><div class="top">
        <span class="tag">📝 텍스트</span>
        <span class="meta">${fmtTime(it.ts)}
          <button class="del" onclick="del(${it.id})">삭제</button></span></div>
        <div class="note">${escapeHtml(it.preview)}</div>
        <button class="alt" style="margin-top:8px;padding:5px 10px;font-size:12px"
          onclick="copyText(${it.id})">복사</button></div>`;
    }
    return `<div class="item"><div class="top">
      <span class="name">📎 ${escapeHtml(it.name)}</span>
      <button class="del" onclick="del(${it.id})">삭제</button></div>
      <div class="meta">${fmtSize(it.size)} · ${fmtTime(it.ts)} ·
        <a class="dl" href="/api/get?id=${it.id}">⬇ 다운로드</a></div></div>`;
  }).join('');
}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

async function sendNote(){
  const v=$('#txt').value.trim(); if(!v)return toast('내용이 비었어요');
  const r=await(await fetch('/api/note',{method:'POST',body:v})).json();
  if(r.ok){$('#txt').value='';lastNote=v;toast('보냈어요');load();}else toast('실패: '+r.error);
}
async function upload(files){
  for(const f of files){
    if(f.size>200*1048576){toast(f.name+' 200MB 초과');continue;}
    $('#prog').textContent='업로드 중: '+f.name+' …';
    const r=await(await fetch('/api/upload?name='+encodeURIComponent(f.name),
      {method:'PUT',body:f})).json();
    $('#prog').textContent=r.ok?('완료: '+f.name):('실패: '+r.error);
  }
  load();
}
async function del(id){if(!confirm('삭제할까요?'))return;
  await fetch('/api/del?id='+id,{method:'POST'});load();}
async function copyText(id){
  const items=(await(await fetch('/api/list')).json()).items;
  const it=items.find(x=>x.id===id);
  if(it){await navigator.clipboard.writeText(it.preview);toast('복사됨');}
}
function copyLast(){if(lastNote){navigator.clipboard.writeText(lastNote);toast('최근 텍스트 복사됨');}
  else toast('복사할 텍스트 없음');}

// 드래그앤드롭
const d=$('#drop');
['dragenter','dragover'].forEach(e=>d.addEventListener(e,ev=>{
  ev.preventDefault();d.classList.add('hot');}));
['dragleave','drop'].forEach(e=>d.addEventListener(e,ev=>{
  ev.preventDefault();d.classList.remove('hot');}));
d.addEventListener('drop',ev=>upload(ev.dataTransfer.files));
// 붙여넣기로 이미지 업로드
window.addEventListener('paste',ev=>{
  const f=[...ev.clipboardData.files]; if(f.length)upload(f);});

load(); setInterval(load,5000);
</script>
</body>
</html>
