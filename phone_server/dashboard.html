<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📱 Note10 폰서버 대시보드</title>
<style>
  :root{
    --bg:#1e1e2e; --card:#181825; --line:#2c2c2a;
    --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --bad:#e66767; --good:#0ca30c;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);
       font-family:"Noto Sans CJK KR","Malgun Gothic",sans-serif;padding:12px}
  h1{font-size:18px;margin-bottom:2px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
        padding:12px;margin-bottom:10px}
  .kpi .v{font-size:26px;font-weight:700}
  .kpi .l{font-size:12px;color:var(--ink2);margin-top:2px}
  .err{background:#3a2030;border:1px solid var(--bad);color:#f5c2c2;
       border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px;display:none;
       white-space:pre-wrap}
  canvas{width:100%;height:120px;display:block;touch-action:none}
  .chart-title{font-size:13px;color:var(--ink2);margin-bottom:6px;
               display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2)}
  .chip i{width:10px;height:10px;border-radius:3px;display:inline-block}
  button{background:var(--s1);border:0;color:#fff;border-radius:8px;
         padding:10px 14px;font-size:14px;margin:4px 6px 4px 0}
  button.alt{background:#313244}
  img#shot{max-width:100%;border-radius:8px;margin-top:8px;display:none}
  table{width:100%;font-size:13px;border-collapse:collapse}
  td{padding:5px 4px;border-bottom:1px solid var(--line);color:var(--ink2)}
  td.ok{color:var(--good)} td.no{color:var(--bad)}
  .tip{position:fixed;background:#11111b;border:1px solid var(--line);color:var(--ink);
       font-size:11px;padding:4px 8px;border-radius:6px;pointer-events:none;
       display:none;z-index:9}
</style>
</head>
<body>
<h1>📱 갤럭시 노트10 폰서버</h1>
<div class="sub" id="clock">연결 중…</div>
<div class="err" id="errbox"></div>

<div class="grid">
  <div class="card kpi"><div class="v" id="bat">–</div><div class="l">배터리</div></div>
  <div class="card kpi"><div class="v" id="temp">–</div><div class="l">배터리 온도</div></div>
  <div class="card kpi"><div class="v" id="mem">–</div><div class="l">메모리 사용</div></div>
  <div class="card kpi"><div class="v" id="up">–</div><div class="l">가동 시간</div></div>
</div>

<div class="card">
  <div class="chart-title">가속도계 (m/s²)
    <span class="chip"><i style="background:var(--s1)"></i>x</span>
    <span class="chip"><i style="background:var(--s2)"></i>y</span>
    <span class="chip"><i style="background:var(--s3)"></i>z</span>
  </div>
  <canvas id="accel"></canvas>
</div>
<div class="card">
  <div class="chart-title">조도 센서 (lux)</div>
  <canvas id="light"></canvas>
</div>

<div class="card">
  <div class="chart-title">카메라 / 장치 제어</div>
  <button onclick="shot(0)">📷 후면 촬영</button>
  <button onclick="shot(1)">🤳 전면 촬영</button>
  <button class="alt" onclick="torch(true)">🔦 켜기</button>
  <button class="alt" onclick="torch(false)">끄기</button>
  <button class="alt" onclick="fetch('/api/vibrate')">📳 진동</button>
  <img id="shot" alt="">
</div>

<div class="card">
  <div class="chart-title">🩺 자가진단 <button class="alt" style="padding:4px 10px"
    onclick="runDoctor()">다시 검사</button></div>
  <table id="doc"><tr><td>검사 중…</td></tr></table>
</div>
<div class="tip" id="tip"></div>

<script>
const $=id=>document.getElementById(id);
const N=60, hist={ax:[],ay:[],az:[],lx:[]};
let errCnt=0;

function showErr(msg){ $('errbox').style.display='block'; $('errbox').textContent='⚠ '+msg; }
function clearErr(){ $('errbox').style.display='none'; }

function draw(cv,series,colors){
  const c=cv.getContext('2d'),W=cv.width=cv.clientWidth*2,H=cv.height=240;
  c.clearRect(0,0,W,H);
  const all=series.flat(); if(!all.length)return;
  let lo=Math.min(...all),hi=Math.max(...all);
  if(hi-lo<1e-6){hi+=1;lo-=1;}
  // 눈금(은은한 그리드 2줄)
  c.strokeStyle='#2c2c2a';c.lineWidth=1;
  [0.33,0.66].forEach(f=>{c.beginPath();c.moveTo(0,H*f);c.lineTo(W,H*f);c.stroke();});
  c.fillStyle='#898781';c.font='20px sans-serif';
  c.fillText(hi.toFixed(1),8,24); c.fillText(lo.toFixed(1),8,H-8);
  series.forEach((s,i)=>{
    c.strokeStyle=colors[i];c.lineWidth=4;c.beginPath();
    s.forEach((v,j)=>{
      const x=j/(N-1)*W, y=H-8-(v-lo)/(hi-lo)*(H-16);
      j?c.lineTo(x,y):c.moveTo(x,y);
    });
    c.stroke();
  });
  cv._data={series,colors,lo,hi};
}
// 터치/호버 툴팁
function hookTip(cv,names){
  const move=e=>{
    const d=cv._data; if(!d)return;
    const r=cv.getBoundingClientRect();
    const px=(e.touches?e.touches[0].clientX:e.clientX);
    const i=Math.round((px-r.left)/r.width*(N-1));
    const vals=d.series.map((s,k)=>s[i]!==undefined?names[k]+': '+s[i].toFixed(2):null)
                       .filter(Boolean);
    if(!vals.length)return;
    const t=$('tip'); t.style.display='block';
    t.style.left=(px+10)+'px';
    t.style.top=((e.touches?e.touches[0].clientY:e.clientY)-30)+'px';
    t.textContent=vals.join('  ');
  };
  cv.addEventListener('mousemove',move);
  cv.addEventListener('touchmove',move);
  cv.addEventListener('mouseleave',()=>$('tip').style.display='none');
  cv.addEventListener('touchend',()=>$('tip').style.display='none');
}
hookTip($('accel'),['x','y','z']); hookTip($('light'),['lux']);

async function pollStatus(){
  try{
    const r=await(await fetch('/api/status')).json();
    if(r.battery){
      $('bat').textContent=r.battery.percentage+'%';
      $('bat').style.color=r.battery.percentage<20?'var(--bad)':'var(--ink)';
      $('temp').textContent=(r.battery.temperature??0).toFixed(1)+'°C';
    }else if(r.battery_err){showErr(r.battery_err);}
    if(r.sys){
      $('mem').textContent=(r.sys.mem_used_pct??'–')+'%';
      $('up').textContent=(r.sys.uptime_h??'–')+'h';
      $('clock').textContent=r.sys.host+' · '+r.sys.time+' · 5초마다 갱신';
    }
  }catch(e){showErr('서버 연결 끊김: '+e.message);}
}
async function pollSensors(){
  try{
    const r=await(await fetch('/api/sensors')).json();
    if(!r.ok){ if(++errCnt>2)showErr(r.error); return; }
    errCnt=0; clearErr();
    const d=r.data;
    if(d.accel){['ax','ay','az'].forEach((k,i)=>{
      hist[k].push(d.accel[i]); if(hist[k].length>N)hist[k].shift();});}
    if(d.light){hist.lx.push(d.light[0]); if(hist.lx.length>N)hist.lx.shift();}
    draw($('accel'),[hist.ax,hist.ay,hist.az],
         ['#3987e5','#199e70','#c98500']);
    draw($('light'),[hist.lx],['#3987e5']);
  }catch(e){}
}
async function shot(cam){
  const img=$('shot'); img.style.display='none';
  showErr('촬영 중… (최대 25초, 화면을 켠 상태로 유지)');
  const r=await fetch('/api/photo?cam='+cam);
  if(r.ok){ clearErr();
    img.src=URL.createObjectURL(await r.blob()); img.style.display='block';
  }else{ const j=await r.json(); showErr(j.error); }
}
async function torch(on){
  const r=await(await fetch('/api/torch?state='+(on?'on':'off'))).json();
  r.ok?clearErr():showErr(r.error);
}
async function runDoctor(){
  const r=await(await fetch('/api/doctor')).json();
  $('doc').innerHTML=r.checks.map(c=>
    `<tr><td class="${c.ok?'ok':'no'}">${c.ok?'✔':'✘'}</td>
     <td>${c.name}</td><td>${c.hint||''}</td></tr>`).join('');
}
pollStatus(); pollSensors(); runDoctor();
setInterval(pollStatus,5000); setInterval(pollSensors,3000);
</script>
</body>
</html>
