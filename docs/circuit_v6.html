<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<style>
  body{background:#0d1117;margin:0;padding:16px;font-family:'Segoe UI','NanumGothic',sans-serif}
  .cap{color:#e6edf3;text-align:center;font-size:15px;margin:6px 0 2px}
  .sub{color:#8b949e;text-align:center;font-size:12px;margin-bottom:8px}
  .new{color:#f0b72f}
</style></head><body>
<div class="cap">🔌 KOSPI 다이오드 모델 <b>v6</b> — 다요인 온도계 구동 + 거대자금 전류원</div>
<div class="sub">v5(RLC+다이오드) 베이스 유지 · <span class="new">노란색 = v6 신규</span></div>
<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f85149"/></marker>
    <marker id="ay" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f0b72f"/></marker>
  </defs>
  <rect x="0" y="0" width="1000" height="560" fill="#0d1117"/>

  <!-- 메인 회로 루프 -->
  <line x1="90" y1="120" x2="900" y2="120" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="90" y1="120" x2="90" y2="400" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="90" y1="400" x2="900" y2="400" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="900" y1="120" x2="900" y2="400" stroke="#c9d1d9" stroke-width="2.5"/>

  <!-- V_target 전원 (좌) -->
  <line x1="74" y1="245" x2="106" y2="245" stroke="#58a6ff" stroke-width="3"/>
  <line x1="82" y1="262" x2="98" y2="262" stroke="#58a6ff" stroke-width="3"/>
  <line x1="74" y1="279" x2="106" y2="279" stroke="#58a6ff" stroke-width="3"/>
  <text x="60" y="250" fill="#58a6ff" font-size="15" text-anchor="end">+</text>
  <text x="36" y="300" fill="#58a6ff" font-size="13">V_target</text>
  <text x="20" y="316" fill="#8b949e" font-size="10">균형가(전원)</text>

  <!-- R_eff 저항 (상단 좌) -->
  <text x="210" y="100" fill="#d29922" font-size="13" text-anchor="middle">R_eff</text>
  <polyline points="160,120 172,120 178,108 190,132 202,108 214,132 226,108 232,120 250,120"
    fill="none" stroke="#d29922" stroke-width="2.5"/>
  <text x="205" y="150" fill="#f0b72f" font-size="10" text-anchor="middle" class="new">×(1+FX·금리 페널티)</text>

  <!-- L_program 인덕터 -->
  <text x="400" y="100" fill="#a371f7" font-size="13" text-anchor="middle">L_program</text>
  <path d="M350,120 q12,-20 24,0 q12,-20 24,0 q12,-20 24,0 q12,-20 24,0"
    fill="none" stroke="#a371f7" stroke-width="2.5"/>
  <line x1="446" y1="120" x2="470" y2="120" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="326" y1="120" x2="350" y2="120" stroke="#c9d1d9" stroke-width="2.5"/>
  <text x="400" y="150" fill="#8b949e" font-size="10" text-anchor="middle">레버리지 관성</text>

  <!-- D_sell 다이오드 -->
  <text x="610" y="100" fill="#f85149" font-size="13" text-anchor="middle">D_sell ▶|</text>
  <line x1="560" y1="120" x2="595" y2="120" stroke="#c9d1d9" stroke-width="2.5"/>
  <polygon points="595,108 595,132 619,120" fill="#f85149"/>
  <line x1="619" y1="106" x2="619" y2="134" stroke="#f85149" stroke-width="3"/>
  <line x1="619" y1="120" x2="660" y2="120" stroke="#c9d1d9" stroke-width="2.5"/>
  <text x="610" y="150" fill="#8b949e" font-size="10" text-anchor="middle">외+기 동반매도 도통</text>

  <!-- C 커패시터 (중앙 세로) -->
  <line x1="500" y1="120" x2="500" y2="240" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="478" y1="240" x2="522" y2="240" stroke="#3fb950" stroke-width="3"/>
  <line x1="478" y1="256" x2="522" y2="256" stroke="#3fb950" stroke-width="3"/>
  <line x1="500" y1="256" x2="500" y2="400" stroke="#c9d1d9" stroke-width="2.5"/>
  <text x="535" y="244" fill="#3fb950" font-size="12">C_individual</text>
  <text x="535" y="259" fill="#8b949e" font-size="10">개인 흡수</text>

  <!-- I_forced 거대자금 전류원 (우 세로) -->
  <line x1="760" y1="120" x2="760" y2="225" stroke="#c9d1d9" stroke-width="2.5"/>
  <circle cx="760" cy="262" r="32" fill="none" stroke="#f85149" stroke-width="2.5"/>
  <line x1="760" y1="246" x2="760" y2="280" stroke="#f85149" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="760" y1="294" x2="760" y2="400" stroke="#c9d1d9" stroke-width="2.5"/>
  <text x="800" y="250" fill="#f85149" font-size="13">I_forced</text>
  <text x="800" y="266" fill="#f0b72f" font-size="10" class="new">거대자금</text>
  <text x="800" y="280" fill="#f0b72f" font-size="10" class="new">(블랙록·패시브)</text>

  <!-- 출력 V(t) -->
  <circle cx="900" cy="300" r="6" fill="#58a6ff"/>
  <text x="915" y="296" fill="#58a6ff" font-size="14" font-weight="bold">V(t)</text>
  <text x="915" y="312" fill="#8b949e" font-size="10">KOSPI</text>

  <!-- 접지 -->
  <line x1="490" y1="400" x2="490" y2="420" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="472" y1="420" x2="508" y2="420" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="478" y1="428" x2="502" y2="428" stroke="#c9d1d9" stroke-width="2.5"/>
  <line x1="485" y1="436" x2="495" y2="436" stroke="#c9d1d9" stroke-width="2.5"/>

  <!-- ===== v6 신규: 온도계 입력부 (하단) ===== -->
  <rect x="60" y="468" width="880" height="78" rx="8" fill="#161b22" stroke="#f0b72f" stroke-dasharray="4"/>
  <text x="75" y="488" fill="#f0b72f" font-size="12" font-weight="bold">🌡 v6 다요인 온도계 입력</text>

  <!-- V_target 구동: US + DXY -->
  <text x="150" y="510" fill="#58a6ff" font-size="10">US지수·SOX·DXY</text>
  <line x1="150" y1="496" x2="90" y2="290" stroke="#f0b72f" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#ay)"/>
  <text x="150" y="524" fill="#8b949e" font-size="9">→ V_target 구동</text>

  <!-- R 구동: FX·금리 -->
  <text x="350" y="510" fill="#d29922" font-size="10">USD/KRW·한미금리차</text>
  <line x1="350" y1="496" x2="205" y2="132" stroke="#f0b72f" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#ay)"/>
  <text x="350" y="524" fill="#8b949e" font-size="9">→ R_eff 페널티(외인이탈)</text>

  <!-- I_forced 구동: 거대자금 프록시 -->
  <text x="600" y="510" fill="#f85149" font-size="10">외국인+EWY+MSCI리밸런싱+FX캐리+레버리지ETF</text>
  <line x1="700" y1="496" x2="760" y2="294" stroke="#f0b72f" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#ay)"/>
  <text x="600" y="524" fill="#8b949e" font-size="9">→ I_forced 거대자금 전류 정량화</text>
  <text x="600" y="538" fill="#8b949e" font-size="9">I≈α·외인+β·EWY유출+γ·리밸런싱+δ·FX캐리+ε·디레버리징</text>
</svg>
</body></html>
